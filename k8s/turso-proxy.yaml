---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turso-proxy
  namespace: betterscore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turso-proxy
  template:
    metadata:
      labels:
        app: turso-proxy
    spec:
      containers:
        - name: proxy
          image: node:22-alpine
          command: ["node", "/app/server.js"]
          ports:
            - containerPort: 4000
          env:
            - name: TURSO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: turso-secret
                  key: token
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: js
              mountPath: /app
      volumes:
        - name: js
          configMap:
            name: turso-proxy-js

---
apiVersion: v1
kind: Service
metadata:
  name: turso-proxy
  namespace: betterscore
spec:
  selector:
    app: turso-proxy
  ports:
    - port: 4000
      targetPort: 4000

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Power Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e0e0e0; font-family: -apple-system, sans-serif; padding: 16px; }
  h1 { text-align: center; font-size: 1.4rem; margin-bottom: 16px; color: #fff; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: #1a1d27; border-radius: 12px; padding: 14px; text-align: center; }
  .stat .label { font-size: 0.75rem; color: #888; margin-bottom: 6px; }
  .stat .value { font-size: 1.8rem; font-weight: 700; }
  .stat .unit { font-size: 0.75rem; color: #888; }
  .green { color: #4ade80; }
  .red { color: #f87171; }
  .yellow { color: #fbbf24; }
  .blue { color: #60a5fa; }
  .chart-card { background: #1a1d27; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .chart-card h2 { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; }
  canvas { max-height: 200px; }
  .footer { text-align: center; font-size: 0.7rem; color: #555; margin-top: 16px; }
  .loading { text-align: center; color: #555; padding: 40px; }
</style>
</head>
<body>

<h1>⚡ Home Power Dashboard</h1>

<div class="stats">
  <div class="stat">
    <div class="label">Battery SOC</div>
    <div class="value green" id="soc">--</div>
    <div class="unit">%</div>
  </div>
  <div class="stat">
    <div class="label">Home Load</div>
    <div class="value yellow" id="load">--</div>
    <div class="unit">kW</div>
  </div>
  <div class="stat">
    <div class="label">Battery</div>
    <div class="value blue" id="batt">--</div>
    <div class="unit">kW</div>
  </div>
  <div class="stat">
    <div class="label">Grid</div>
    <div class="value" id="grid">--</div>
    <div class="unit">kW</div>
  </div>
  <div class="stat">
    <div class="label">Buy Price</div>
    <div class="value red" id="buy">--</div>
    <div class="unit">c/kWh</div>
  </div>
  <div class="stat">
    <div class="label">FeedIn</div>
    <div class="value green" id="feedin">--</div>
    <div class="unit">c/kWh</div>
  </div>
  <div class="stat">
    <div class="label">Today Net</div>
    <div class="value" id="net">--</div>
    <div class="unit">AUD</div>
  </div>
  <div class="stat">
    <div class="label">Demand Peak</div>
    <div class="value" id="demand">--</div>
    <div class="unit">kW</div>
  </div>
</div>

<div class="chart-card">
  <h2>🔋 Battery SOC (24h)</h2>
  <canvas id="socChart"></canvas>
</div>

<div class="chart-card">
  <h2>⚡ Power Flow (24h)</h2>
  <canvas id="powerChart"></canvas>
</div>

<div class="chart-card">
  <h2>💰 Electricity Price (24h)</h2>
  <canvas id="priceChart"></canvas>
</div>

<div class="footer" id="updated">Loading...</div>

<script>
const TURSO_URL = 'https://home-power-optimizer-mangoo1.aws-ap-south-1.turso.io/v2/pipeline';
const TURSO_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJpYXQiOjE3NzQ5NTU2MjgsImlkIjoiMDE5ZDQzODEtOTYwMS03Njg2LWEwNWUtMjM5MTZjYTU3MzNmIiwicmlkIjoiNGFkNzM3YzctZTRiMS00NTViLWJiMjEtMDM5NmIzNDc4NmU3In0.ircuDV8tvI83BricjrjJrAihL7j016jTepXZa1g1FAP9GCZXD0Iufj6kt5rs52xzK4ZGVzPMpTo97WoUcZXXAg';

let socChartObj, powerChartObj, priceChartObj;

async function query(sql) {
  const res = await fetch(TURSO_URL, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TURSO_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: [{ type: 'execute', stmt: { sql } }, { type: 'close' }] })
  });
  const data = await res.json();
  return data.results[0].response.result.rows;
}

function toSydney(utcStr) {
  return new Date(new Date(utcStr).getTime() + 11 * 3600 * 1000);
}

function fmt(utcStr) {
  const d = toSydney(utcStr);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function chartDefaults() {
  return {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { labels: { color: '#aaa', font: { size: 11 } } } },
    scales: {
      x: { ticks: { color: '#666', maxTicksLimit: 8 }, grid: { color: '#222' } },
      y: { ticks: { color: '#666' }, grid: { color: '#222' } }
    }
  };
}

async function load() {
  try {
    // Latest record
    const latest = await query('SELECT ts, soc, batt_power, home_load, grid_power, buy_price, feedin_price, mode FROM energy_log ORDER BY ts DESC LIMIT 1');
    if (latest.length > 0) {
      const r = latest[0];
      const soc = parseFloat(r[1].value);
      const batt = parseFloat(r[2].value||0);
      const load = parseFloat(r[3].value||0);
      const grid = parseFloat(r[4].value||0);
      const buy = parseFloat(r[5].value||0);
      const fi = parseFloat(r[6].value||0);

      document.getElementById('soc').textContent = soc.toFixed(0);
      document.getElementById('soc').className = 'value ' + (soc > 60 ? 'green' : soc > 30 ? 'yellow' : 'red');
      document.getElementById('load').textContent = load.toFixed(2);
      document.getElementById('batt').textContent = batt.toFixed(2);
      document.getElementById('grid').textContent = grid.toFixed(2);
      document.getElementById('grid').className = 'value ' + (grid < 0 ? 'green' : grid > 0.5 ? 'red' : '');
      document.getElementById('buy').textContent = buy.toFixed(2);
      document.getElementById('feedin').textContent = fi.toFixed(2);
    }

    // Today summary
    const today = await query("SELECT cost_aud, earnings_aud, demand_peak_kw FROM daily_summary ORDER BY date DESC LIMIT 1");
    if (today.length > 0) {
      const net = parseFloat(today[0][0].value||0) - parseFloat(today[0][1].value||0);
      const peak = parseFloat(today[0][2].value||0);
      const netEl = document.getElementById('net');
      netEl.textContent = (net >= 0 ? '+' : '') + net.toFixed(2);
      netEl.className = 'value ' + (net < 0 ? 'green' : 'red');
      const demandEl = document.getElementById('demand');
      demandEl.textContent = peak.toFixed(2);
      demandEl.className = 'value ' + (peak < 0.5 ? 'green' : peak < 1.5 ? 'yellow' : 'red');
    }

    // 24h history
    const hist = await query("SELECT ts, soc, batt_power, home_load, grid_power, buy_price, feedin_price FROM energy_log WHERE ts >= datetime('now','-24 hours') ORDER BY ts");
    const labels = hist.map(r => fmt(r[0].value));
    const socs = hist.map(r => parseFloat(r[1].value||0));
    const batts = hist.map(r => parseFloat(r[2].value||0));
    const loads = hist.map(r => parseFloat(r[3].value||0));
    const grids = hist.map(r => parseFloat(r[4].value||0));
    const buys = hist.map(r => parseFloat(r[5].value||0));
    const feedins = hist.map(r => parseFloat(r[6].value||0));

    // SOC chart
    if (socChartObj) socChartObj.destroy();
    socChartObj = new Chart(document.getElementById('socChart'), {
      type: 'line',
      data: { labels, datasets: [{ label: 'SOC %', data: socs, borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] },
      options: { ...chartDefaults(), scales: { ...chartDefaults().scales, y: { ...chartDefaults().scales.y, min: 0, max: 100 } } }
    });

    // Power chart
    if (powerChartObj) powerChartObj.destroy();
    powerChartObj = new Chart(document.getElementById('powerChart'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Home Load', data: loads, borderColor: '#fbbf24', tension: 0.3, pointRadius: 0 },
        { label: 'Battery', data: batts, borderColor: '#60a5fa', tension: 0.3, pointRadius: 0 },
        { label: 'Grid', data: grids, borderColor: '#f87171', tension: 0.3, pointRadius: 0 }
      ]},
      options: chartDefaults()
    });

    // Price chart
    if (priceChartObj) priceChartObj.destroy();
    priceChartObj = new Chart(document.getElementById('priceChart'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Buy c/kWh', data: buys, borderColor: '#f87171', tension: 0.3, pointRadius: 0 },
        { label: 'FeedIn c/kWh', data: feedins, borderColor: '#4ade80', tension: 0.3, pointRadius: 0 }
      ]},
      options: chartDefaults()
    });

    const sydneyNow = toSydney(new Date().toISOString());
    document.getElementById('updated').textContent = 'Updated: ' + sydneyNow.toLocaleTimeString('en-AU', {timeZone:'Australia/Sydney'}) + ' AEDT | Auto-refresh 5min';

  } catch(e) {
    document.getElementById('updated').textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

load();
setInterval(load, 5 * 60 * 1000); // refresh every 5 min
</script>
</body>
</html>
